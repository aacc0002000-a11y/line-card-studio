<style>
  :root {
    --bg: #f5f1e8;
    --panel: #fffdf8;
    --border: #d7c8ad;
    --text: #2f261b;
    --muted: #6b5d4b;
    --primary: #2d6a4f;
    --primary-hover: #245640;
    --secondary: #efe4d1;
    --shadow: 0 20px 45px rgba(47, 38, 27, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 35%),
      linear-gradient(180deg, #f8f3ea 0%, #efe5d3 100%);
    color: var(--text);
  }

  .page {
    min-height: 100vh;
    padding: 32px 16px;
  }

  .panel {
    max-width: 920px;
    margin: 0 auto;
    padding: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
  }

  .panel-header {
    margin-bottom: 20px;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1,
  h2 {
    margin: 0;
  }

  h1 {
    font-size: 30px;
    line-height: 1.2;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 12px;
  }

  .description {
    margin: 12px 0 0;
    color: var(--muted);
    line-height: 1.7;
  }

  .toolbar,
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .toolbar {
    margin-bottom: 20px;
  }

  .feedback-toast {
    min-height: 22px;
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    opacity: 0;
    transition: opacity 180ms ease;
  }

  .feedback-toast.is-visible {
    opacity: 1;
  }

  .form {
    display: grid;
    gap: 18px;
  }

  .field-grid,
  .button-grid,
  .upload-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .button-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .field,
  .button-card {
    display: grid;
    gap: 8px;
  }

  .field {
    font-size: 14px;
    font-weight: 700;
  }

  .field input,
  .field textarea,
  .button-card input {
    width: 100%;
    padding: 12px 14px;
    font: inherit;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .field textarea {
    resize: vertical;
    min-height: 120px;
  }

  .color-field {
    align-content: start;
  }

  .color-input-row {
    display: grid;
    grid-template-columns: 56px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
  }

  .color-picker {
    width: 56px;
    height: 44px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
  }

  .color-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    padding: 0;
    border: 2px solid rgba(23, 32, 51, 0.12);
    border-radius: 999px;
    cursor: pointer;
  }

  .color-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .button-tertiary {
    color: var(--primary);
    background: #edf6f0;
  }

  .color-error {
    min-height: 18px;
    font-size: 12px;
    font-weight: 600;
    color: #b42318;
  }

  .hint {
    margin: 0;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    line-height: 1.6;
  }

  .field-checkbox {
    align-content: end;
  }

  .field-checkbox input {
    width: 20px;
    height: 20px;
    padding: 0;
  }

  .subsection {
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #fbf7f0;
  }

  .tip-panel,
  .fixed-button-card {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
    padding: 14px 16px;
    border: 1px solid rgba(45, 106, 79, 0.18);
    border-radius: 14px;
    background: #f4f8f2;
  }

  .tip-title,
  .fixed-button-title {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
  }

  .tip-text,
  .fixed-button-text {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
  }

  .button-card {
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
    align-content: start;
  }

  .button-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .button-card label {
    display: grid;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .fixed-button-colors {
    margin-top: 8px;
  }

  .file-input-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .file-trigger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: fit-content;
  }

  .upload-actions {
    display: grid;
    align-content: start;
    gap: 12px;
  }

  .upload-status {
    margin: 0;
    min-height: 22px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
  }

  .upload-status[data-tone="success"] {
    color: var(--primary);
  }

  .upload-status[data-tone="error"] {
    color: #b42318;
  }

  .upload-status[data-tone="info"] {
    color: #7a5c1f;
  }

  .photo-preview-panel {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 240px) minmax(0, 1fr);
    align-items: start;
    margin-top: 16px;
  }

  .photo-preview {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: contain;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: #f8f3ea;
  }

  .photo-meta {
    display: grid;
    gap: 8px;
    align-content: start;
  }

  .button-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .button {
    appearance: none;
    border: 0;
    border-radius: 999px;
    padding: 12px 18px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .button-primary {
    color: #fff;
    background: var(--primary);
  }

  .button-primary:hover {
    background: var(--primary-hover);
  }

  .button-secondary {
    color: var(--text);
    background: var(--secondary);
  }

  .result-panel {
    margin-top: 24px;
    padding: 20px;
    border-radius: 16px;
    background: #fbf7f0;
    border: 1px solid var(--border);
  }

  .result-panel.is-hidden {
    display: none;
  }

  .link-panel-body {
    display: grid;
    gap: 14px;
  }

  .link-output {
    width: 100%;
    padding: 12px 14px;
    font: inherit;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .link-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  #result {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
  }

  @media (max-width: 720px) {
    .page {
      padding: 20px 12px;
    }

    .panel {
      padding: 20px;
      border-radius: 16px;
    }

    .field-grid,
    .button-grid,
    .upload-grid,
    .photo-preview-panel {
      grid-template-columns: 1fr;
    }

    .toolbar,
    .actions {
      flex-direction: column;
    }

    .button {
      width: 100%;
    }
  }
</style>
